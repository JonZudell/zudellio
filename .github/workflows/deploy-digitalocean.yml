name: Deploy to DigitalOcean

on:
  pull_request:
    paths:
      - 'interface/**'
      - 'terraform/digitalocean/**'
      - '.github/workflows/deploy-digitalocean.yml'
  push:
    branches:
      - main
    paths:
      - 'interface/**'
      - 'terraform/digitalocean/**'
      - '.github/workflows/deploy-digitalocean.yml'
  workflow_dispatch:

concurrency:
  group: digitalocean-terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: digitalocean-production
    defaults:
      run:
        working-directory: terraform/digitalocean
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_github_branch: main
      TF_VAR_source_dir: interface
      TF_VAR_build_command: npm ci && npm run build
      TF_VAR_state_bucket_name: ${{ vars.DO_STATE_BUCKET_NAME || 'zudellio-tf-state' }}
      TF_VAR_spaces_region: ${{ vars.DO_SPACES_REGION || 'nyc3' }}
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      AWS_EC2_METADATA_DISABLED: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required secrets and settings
        run: |
          if [ -z "${{ secrets.DIGITALOCEAN_TOKEN }}" ]; then
            echo "Missing required Environment Secret: DIGITALOCEAN_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.DO_SPACES_ACCESS_KEY_ID }}" ]; then
            echo "Missing required Environment Secret: DO_SPACES_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}" ]; then
            echo "Missing required Environment Secret: DO_SPACES_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${TF_VAR_state_bucket_name}" ]; then
            echo "Missing required variable: DO_STATE_BUCKET_NAME"
            exit 1
          fi

      - name: Diagnose Spaces backend access (non-blocking)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: true
        run: |
          set +e
          endpoint="https://${TF_VAR_spaces_region}.digitaloceanspaces.com"
          test_key="terraform/digitalocean/backend-access-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.txt"

          aws s3api head-bucket --bucket "${TF_VAR_state_bucket_name}" --endpoint-url "${endpoint}" >/dev/null 2>&1
          head_status=$?

          if [ ${head_status} -ne 0 ]; then
            echo "Warning: unable to access bucket ${TF_VAR_state_bucket_name} via head-bucket."
            echo "Terraform init will run next and provide authoritative backend errors."
          fi

          aws s3api put-object --bucket "${TF_VAR_state_bucket_name}" --key "${test_key}" --body /dev/null --endpoint-url "${endpoint}" >/tmp/spaces_put.out 2>&1
          put_status=$?

          if [ ${put_status} -ne 0 ]; then
            echo "Warning: preflight put-object failed for ${TF_VAR_state_bucket_name}."
            cat /tmp/spaces_put.out
            echo "Continuing to terraform init for definitive backend validation."
            exit 0
          fi

          aws s3api delete-object --bucket "${TF_VAR_state_bucket_name}" --key "${test_key}" --endpoint-url "${endpoint}" >/dev/null 2>&1 || true

      - name: Write backend configuration
        run: |
          cat > backend.hcl <<EOF
          bucket     = "${TF_VAR_state_bucket_name}"
          key        = "terraform/digitalocean/website.tfstate"
          region     = "us-east-1"
          endpoints = {
            s3 = "https://${TF_VAR_spaces_region}.digitaloceanspaces.com"
          }
          skip_credentials_validation = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_s3_checksum            = true
          use_path_style              = true
          EOF
          echo "Backend config created"
          cat backend.hcl

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
          AWS_ENDPOINT_URL_S3: https://${{ vars.DO_SPACES_REGION || 'nyc3' }}.digitaloceanspaces.com
        run: terraform init -backend-config=backend.hcl

      - name: Import existing app if present
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
          AWS_ENDPOINT_URL_S3: https://${{ vars.DO_SPACES_REGION || 'nyc3' }}.digitaloceanspaces.com
        run: |
          if terraform state show digitalocean_app.website >/dev/null 2>&1; then
            echo "digitalocean_app.website is already tracked in state"
            exit 0
          fi

          app_name="${TF_VAR_app_name:-zudellio}"
          app_id=$(curl -fsS \
            -H "Authorization: Bearer ${DIGITALOCEAN_TOKEN}" \
            "https://api.digitalocean.com/v2/apps?per_page=200" \
            | jq -r --arg app_name "${app_name}" '.apps[] | select(.spec.name == $app_name) | .id' \
            | head -n1)

          if [ -z "${app_id}" ]; then
            echo "No existing app named ${app_name} found. Terraform will create it."
            exit 0
          fi

          echo "Importing existing app '${app_name}' (${app_id}) into Terraform state"
          terraform import digitalocean_app.website "${app_id}"

      - name: Terraform validate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
          AWS_ENDPOINT_URL_S3: https://${{ vars.DO_SPACES_REGION || 'nyc3' }}.digitaloceanspaces.com
        run: terraform validate

      - name: Terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
          AWS_ENDPOINT_URL_S3: https://${{ vars.DO_SPACES_REGION || 'nyc3' }}.digitaloceanspaces.com
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
          AWS_ENDPOINT_URL_S3: https://${{ vars.DO_SPACES_REGION || 'nyc3' }}.digitaloceanspaces.com
        run: terraform apply -auto-approve tfplan
