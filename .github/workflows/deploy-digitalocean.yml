name: Deploy to DigitalOcean

on:
  pull_request:
    paths:
      - 'interface/**'
      - 'terraform/digitalocean/**'
      - '.github/workflows/deploy-digitalocean.yml'
  push:
    branches:
      - main
    paths:
      - 'interface/**'
      - 'terraform/digitalocean/**'
      - '.github/workflows/deploy-digitalocean.yml'
  workflow_dispatch:

concurrency:
  group: digitalocean-terraform
  cancel-in-progress: false

jobs:
  bootstrap-backend:
    runs-on: ubuntu-latest
    environment: digitalocean-production
    outputs:
      state_bucket: ${{ steps.capture.outputs.state_bucket }}
      state_region: ${{ steps.capture.outputs.state_region }}
      state_endpoint: ${{ steps.capture.outputs.state_endpoint }}
      spaces_access_key: ${{ steps.bootstrap_spaces_key.outputs.access_key }}
      spaces_secret_key: ${{ steps.bootstrap_spaces_key.outputs.secret_key }}
    defaults:
      run:
        working-directory: terraform/digitalocean-bootstrap
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_bucket_name: ${{ vars.DO_STATE_BUCKET_NAME || 'zudellio-tf-state' }}
      TF_VAR_spaces_region: ${{ vars.DO_SPACES_REGION || 'nyc3' }}
      TF_VAR_spaces_key_name: ${{ vars.DO_SPACES_KEY_NAME || 'terraform-backend-key' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate DigitalOcean token
        run: |
          if [ -z "${{ secrets.DIGITALOCEAN_TOKEN }}" ]; then
            echo "Missing required Environment Secret: DIGITALOCEAN_TOKEN"
            echo "This value must be created under Settings > Environments > digitalocean-production > Secrets."
            echo "Putting DIGITALOCEAN_TOKEN under Variables is not enough for this workflow."
            exit 1
          fi

      - name: Create temporary Spaces credentials for bootstrap
        id: bootstrap_spaces_key
        run: |
          key_name="${TF_VAR_spaces_key_name}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          payload=$(cat <<EOF
          {
            "name": "${key_name}"
          }
          EOF
          )

          response=$(curl -sS -X POST \
            -H "Authorization: Bearer ${DIGITALOCEAN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "https://api.digitalocean.com/v2/spaces/keys")

          access_key=$(echo "${response}" | jq -r '.key.access_key // empty')
          secret_key=$(echo "${response}" | jq -r '.key.secret_key // empty')

          if [ -z "${access_key}" ] || [ -z "${secret_key}" ]; then
            echo "Failed to create temporary Spaces credentials. API response:"
            echo "${response}"
            exit 1
          fi

          echo "::add-mask::${access_key}"
          echo "::add-mask::${secret_key}"
          echo "access_key=${access_key}" >> "$GITHUB_OUTPUT"
          echo "secret_key=${secret_key}" >> "$GITHUB_OUTPUT"

      - name: Create Spaces bucket via API
        id: bucket_create
        run: |
          # Try to create the bucket - will fail if already exists, which is fine
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer ${DIGITALOCEAN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${TF_VAR_bucket_name}\",\"region\":\"${TF_VAR_spaces_region}\"}" \
            "https://api.digitalocean.com/v2/spaces" 2>&1 || echo '{}')

          # If bucket was created successfully, extract details from response
          if echo "${response}" | jq -e '.space' > /dev/null 2>&1; then
            endpoint=$(echo "${response}" | jq -r '.space.endpoint // empty')
            domain_name=$(echo "${response}" | jq -r '.space.bucket_domain_name // empty')
          else
            # Bucket already exists - get details via DigitalOcean API list endpoint
            response=$(curl -sS -X GET \
              -H "Authorization: Bearer ${DIGITALOCEAN_TOKEN}" \
              "https://api.digitalocean.com/v2/spaces?region=${TF_VAR_spaces_region}")
            bucket_data=$(echo "${response}" | jq ".spaces[] | select(.name==\"${TF_VAR_bucket_name}\")" || echo '{}')
            endpoint=$(echo "${bucket_data}" | jq -r '.endpoint // empty')
            domain_name=$(echo "${bucket_data}" | jq -r '.bucket_domain_name // empty')
          fi

          # Default endpoint format if not found
          if [ -z "${endpoint}" ]; then
            endpoint="${TF_VAR_bucket_name}.${TF_VAR_spaces_region}.digitaloceanspaces.com"
          fi
          if [ -z "${domain_name}" ]; then
            domain_name="${TF_VAR_bucket_name}.${TF_VAR_spaces_region}.cdn.digitaloceanspaces.com"
          fi

          echo "bucket_endpoint=${endpoint}" >> "$GITHUB_OUTPUT"
          echo "bucket_domain_name=${domain_name}" >> "$GITHUB_OUTPUT"
          echo "Bucket endpoint: ${endpoint}"
          echo "Bucket domain name: ${domain_name}"

      - name: Terraform init (bootstrap)
        run: terraform init

      - name: Terraform apply (bootstrap)
        env:
          TF_VAR_bucket_endpoint: ${{ steps.bucket_create.outputs.bucket_endpoint }}
          TF_VAR_bucket_domain_name: ${{ steps.bucket_create.outputs.bucket_domain_name }}
        run: terraform apply -auto-approve

      - name: Capture backend outputs
        id: capture
        run: |
          state_bucket="$(terraform output -raw state_bucket_name)"
          state_region="$(terraform output -raw state_backend_region)"
          state_endpoint="$(terraform output -raw state_backend_endpoint)"

          echo "state_bucket=${state_bucket}" >> "$GITHUB_OUTPUT"
          echo "state_region=${state_region}" >> "$GITHUB_OUTPUT"
          echo "state_endpoint=${state_endpoint}" >> "$GITHUB_OUTPUT"

  terraform:
    needs: bootstrap-backend
    runs-on: ubuntu-latest
    environment: digitalocean-production
    defaults:
      run:
        working-directory: terraform/digitalocean
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_github_branch: main
      TF_VAR_source_dir: interface
      TF_VAR_build_command: npm ci && npm run build
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      AWS_EC2_METADATA_DISABLED: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write backend configuration
        run: |
          cat > backend.hcl <<EOF
          bucket     = "${{ needs.bootstrap-backend.outputs.state_bucket }}"
          key        = "terraform/digitalocean/website.tfstate"
          region     = "${{ needs.bootstrap-backend.outputs.state_region }}"
          endpoints = {
            s3 = "${{ needs.bootstrap-backend.outputs.state_endpoint }}"
          }
          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          use_path_style              = true
          EOF

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.bootstrap-backend.outputs.spaces_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.bootstrap-backend.outputs.spaces_secret_key }}
          AWS_EC2_METADATA_DISABLED: true
        run: terraform init -backend-config=backend.hcl

      - name: Terraform validate
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.bootstrap-backend.outputs.spaces_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.bootstrap-backend.outputs.spaces_secret_key }}
          AWS_EC2_METADATA_DISABLED: true
        run: terraform validate

      - name: Terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.bootstrap-backend.outputs.spaces_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.bootstrap-backend.outputs.spaces_secret_key }}
          AWS_EC2_METADATA_DISABLED: true
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.bootstrap-backend.outputs.spaces_access_key }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.bootstrap-backend.outputs.spaces_secret_key }}
          AWS_EC2_METADATA_DISABLED: true
        run: terraform apply -auto-approve tfplan
